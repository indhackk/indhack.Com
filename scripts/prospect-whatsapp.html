        :root {
            --primary: #25D366;
            --secondary: #128C7E;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #25D366 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1rem 2rem;
            border-radius: 1rem;
            border: 1px solid #334155;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .lead-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .lead-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .lead-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .lead-info {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .badge {
            background: #25d36622;
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .message-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #cbd5e1;
        }

        .actions {
            display: flex;
            gap: 1rem;
        }

        button {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 211, 102, 0.3);
        }

        .btn-secondary {
            background: #334155;
            color: white;
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin-top: 2rem;
            overflow: hidden;
        }

        .progress-inner {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s ease;
        }

        .hidden {
            display: none;
        }

        .finished {
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>

        let currentIndex = 0;
        let sentCount = 0;
        const sentList = new Set();

        function updateUI() {
            if (currentIndex >= leads.length) {
                document.getElementById('prospect-card').classList.add('hidden');
                document.getElementById('finished-card').classList.remove('hidden');
                return;
            }

            const lead = leads[currentIndex];
            document.getElementById('lead-name').textContent = lead.name;
            document.getElementById('lead-city').textContent = lead.city;
            document.getElementById('lead-note').textContent = lead.note + '★ (' + lead.avis + ' avis)';

            const msg = `Bonjour, je me permets de vous contacter car je suis tombée sur votre fiche Google My Business et j'ai remarqué que vous aviez de très bons avis (${lead.note}★) !

${lead.url}

Bonne journée !
Indiana`;

            document.getElementById('lead-message').textContent = msg;
            document.getElementById('count-total').textContent = leads.length;
            document.getElementById('count-sent').textContent = sentList.size;

            const progress = ((currentIndex) / leads.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';

            document.getElementById('btn-prev').disabled = currentIndex === 0;
        }

        function sendLead() {
            const lead = leads[currentIndex];
            const msg = document.getElementById('lead-message').textContent;
            const url = `https://wa.me/${lead.mobile}?text=${encodeURIComponent(msg)}`;

            window.open(url, '_blank');
            sentList.add(currentIndex);

            // Auto next after 1 second
            setTimeout(() => {
                nextLead();
            }, 1000);
        }

        function nextLead() {
            if (currentIndex < leads.length) {
                currentIndex++;
                updateUI();
            }
        }

        function prevLead() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function reset() {
            currentIndex = 0;
            sentList.clear();
            document.getElementById('prospect-card').classList.remove('hidden');
            document.getElementById('finished-card').classList.add('hidden');
            updateUI();
        }

        updateUI();
